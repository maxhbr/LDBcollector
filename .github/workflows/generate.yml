name: Generate License Data

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main-source
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@v25
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch generatedV2 branch
        run: |
          cd main-source
          git fetch origin generatedV2:generatedV2

      - name: Generate data
        run: |
          cd main-source
          ./regenerate.sh

      - name: Commit and push
        run: |
          cd main-source/_generatedV2
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update generated license data"
          git push origin HEAD:generatedV2

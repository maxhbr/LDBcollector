<g id="node11" class="node">
<title>6593</title>
<text text-anchor="start" x="177.92" y="-1073.43" font-family="Times,serif" font-size="14.00">Fedora: </text>
<text text-anchor="start" x="222.92" y="-1073.43" font-family="Times,serif" font-weight="bold" font-size="14.00" fill="#228b22">allowed</text>
<text text-anchor="start" x="14.04" y="-1059.43" font-family="Times,serif" font-size="14.00">A license is allowed if Fedora determines that the license is a free software /</text>
<text text-anchor="start" x="8.79" y="-1045.43" font-family="Times,serif" font-size="14.00">open source license. At a high level, the inquiry involves determining whether</text>
<text text-anchor="start" x="7.67" y="-1031.43" font-family="Times,serif" font-size="14.00">the license provides software freedom, and (equivalently) making sure that the</text>
<text text-anchor="start" x="17.79" y="-1017.43" font-family="Times,serif" font-size="14.00">license does not place burdens on users&#39; exercise of its permissions that are</text>
<text text-anchor="start" x="17.42" y="-1003.43" font-family="Times,serif" font-size="14.00">inconsistent with evolving community norms and traditions around what is</text>
<text text-anchor="start" x="9.17" y="-989.43" font-family="Times,serif" font-size="14.00">acceptable in a free software / open source license. See below for more on the</text>
<text text-anchor="start" x="129.17" y="-975.43" font-family="Times,serif" font-size="14.00">history of Fedora licensing policy.</text>
</g>

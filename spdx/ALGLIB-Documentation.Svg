<!-- 6593 -->
<g id="node9" class="node">
<title>6593</title>
<text text-anchor="start" x="1272.25" y="-600.12" font-family="Times,serif" font-size="14.00">Fedora: </text>
<text text-anchor="start" x="1317.25" y="-600.12" font-family="Times,serif" font-weight="bold" font-size="14.00" fill="#228b22">allowed</text>
<text text-anchor="start" x="1108.37" y="-586.12" font-family="Times,serif" font-size="14.00">A license is allowed if Fedora determines that the license is a free software /</text>
<text text-anchor="start" x="1103.12" y="-572.12" font-family="Times,serif" font-size="14.00">open source license. At a high level, the inquiry involves determining whether</text>
<text text-anchor="start" x="1102" y="-558.12" font-family="Times,serif" font-size="14.00">the license provides software freedom, and (equivalently) making sure that the</text>
<text text-anchor="start" x="1112.12" y="-544.12" font-family="Times,serif" font-size="14.00">license does not place burdens on users&#39; exercise of its permissions that are</text>
<text text-anchor="start" x="1111.75" y="-530.12" font-family="Times,serif" font-size="14.00">inconsistent with evolving community norms and traditions around what is</text>
<text text-anchor="start" x="1103.5" y="-516.12" font-family="Times,serif" font-size="14.00">acceptable in a free software / open source license. See below for more on the</text>
<text text-anchor="start" x="1223.5" y="-502.12" font-family="Times,serif" font-size="14.00">history of Fedora licensing policy.</text>
</g>

<!-- 6593 -->
<g id="node10" class="node">
<title>6593</title>
<text text-anchor="start" x="178.28" y="-128.92" font-family="Times,serif" font-size="14.00">Fedora: </text>
<text text-anchor="start" x="223.28" y="-128.92" font-family="Times,serif" font-weight="bold" font-size="14.00" fill="#228b22">allowed</text>
<text text-anchor="start" x="14.41" y="-114.92" font-family="Times,serif" font-size="14.00">A license is allowed if Fedora determines that the license is a free software /</text>
<text text-anchor="start" x="9.16" y="-100.92" font-family="Times,serif" font-size="14.00">open source license. At a high level, the inquiry involves determining whether</text>
<text text-anchor="start" x="8.03" y="-86.92" font-family="Times,serif" font-size="14.00">the license provides software freedom, and (equivalently) making sure that the</text>
<text text-anchor="start" x="18.16" y="-72.92" font-family="Times,serif" font-size="14.00">license does not place burdens on users&#39; exercise of its permissions that are</text>
<text text-anchor="start" x="17.78" y="-58.92" font-family="Times,serif" font-size="14.00">inconsistent with evolving community norms and traditions around what is</text>
<text text-anchor="start" x="9.53" y="-44.92" font-family="Times,serif" font-size="14.00">acceptable in a free software / open source license. See below for more on the</text>
<text text-anchor="start" x="129.53" y="-30.92" font-family="Times,serif" font-size="14.00">history of Fedora licensing policy.</text>
</g>

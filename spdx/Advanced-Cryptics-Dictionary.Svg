<!-- 6593 -->
<g id="node10" class="node">
<title>6593</title>
<text text-anchor="start" x="178.55" y="-104.14" font-family="Times,serif" font-size="14.00">Fedora: </text>
<text text-anchor="start" x="223.55" y="-104.14" font-family="Times,serif" font-weight="bold" font-size="14.00" fill="#228b22">allowed</text>
<text text-anchor="start" x="14.68" y="-90.14" font-family="Times,serif" font-size="14.00">A license is allowed if Fedora determines that the license is a free software /</text>
<text text-anchor="start" x="9.43" y="-76.14" font-family="Times,serif" font-size="14.00">open source license. At a high level, the inquiry involves determining whether</text>
<text text-anchor="start" x="8.3" y="-62.14" font-family="Times,serif" font-size="14.00">the license provides software freedom, and (equivalently) making sure that the</text>
<text text-anchor="start" x="18.43" y="-48.14" font-family="Times,serif" font-size="14.00">license does not place burdens on users&#39; exercise of its permissions that are</text>
<text text-anchor="start" x="18.05" y="-34.14" font-family="Times,serif" font-size="14.00">inconsistent with evolving community norms and traditions around what is</text>
<text text-anchor="start" x="9.8" y="-20.14" font-family="Times,serif" font-size="14.00">acceptable in a free software / open source license. See below for more on the</text>
<text text-anchor="start" x="129.8" y="-6.14" font-family="Times,serif" font-size="14.00">history of Fedora licensing policy.</text>
</g>
